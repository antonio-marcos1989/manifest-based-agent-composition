spring.application.name=manifest-based-agent-composition

server.port=8081

spring.web.resources.add-mappings=false

spring.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/manifest-composition}

honeycomb.http.connect-timeout-ms=5000
honeycomb.http.read-timeout-ms=120000

honeycomb.xai.auto-explain-llm=false

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.mongo.enabled=true
management.health.defaults.enabled=true
